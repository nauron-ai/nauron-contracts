# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

inheritance: true
language: en-US
tone_instructions: "Be concise and pragmatic. Prioritize correctness, regressions, edge cases, resource handling, operability, and readability. Avoid style-only suggestions unless they hide a real bug or clearly violate the repository's coding standards."

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  review_status: true
  review_details: false
  commit_status: true
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: false
  estimate_code_review_effort: true
  suggested_labels: false
  suggested_reviewers: false
  in_progress_fortune: false
  poem: false
  enable_prompt_for_ai_agents: false
  pre_merge_checks:
    docstrings:
      mode: "off"
  path_filters:
    - "src/**"
    - ".github/**"
    - "scripts/**"
    - "Cargo.toml"
    - "Dockerfile"
    - ".coderabbit.yaml"
    - "!target/**"
    - "!Cargo.lock"
  path_instructions:
    - path: "src/**/*.rs"
      instructions: |
        Focus on behavioral regressions, data loss, wrong error handling, retry semantics, resource cleanup, subprocess safety, timeouts, and concurrency issues.
        Treat formatting and naming as low priority unless they hide a correctness problem or make the code materially harder to maintain.
        Prefer simple control flow, small single-responsibility functions, and files with clear ownership.

        Enforce the following repository rules:
        - Flag `unwrap`, `expect`, `unwrap_or`, `panic!`, `todo!` outside of test modules.
        - Flag `clone()` without clear justification.
        - Flag magic numbers and magic strings — require constants or enums.
        - Flag status/type fields stored as strings — require enums.
        - Flag dynamic SQL queries — require `query!` (compile-time checked).
        - Flag `#[allow(...)]` without explicit justification in the PR description.
        - Flag `anyhow` usage — require `thiserror` for error types.
        - Flag nesting deeper than 2 levels.
        - Flag files growing beyond ~250 lines of code; suggest splitting when a practical split exists.
        - Flag helper functions that have side effects.
        - Prefer `?` propagation over `map_err`.

        Do not flag: pure formatting/style, missing doc comments, naming preferences (unless genuinely misleading).
        Prefer findings that explain user or operational impact and missing tests.
    - path: ".github/workflows/**"
      instructions: |
        Focus on broken triggers, wrong branch filters, missing permissions, cache correctness, and steps that can silently pass while skipping verification.
    - path: "scripts/**"
      instructions: |
        Focus on shell safety, quoting, error propagation, portability, and failure handling.
    - path: "Dockerfile"
      instructions: |
        Focus on runtime correctness, missing packages, image size regressions, cache invalidation mistakes, and security-sensitive defaults.
  auto_review:
    enabled: true
    auto_incremental_review: true
    drafts: false
